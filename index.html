<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎓 VacationPro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#060d18;color:#e2e8f0;min-height:100vh;padding-bottom:70px}
        .card{background:#0d1b2e;border:1px solid #1a2d45;border-radius:14px;padding:16px;margin-bottom:12px}
        .btn{border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer}
        .btn-blue{background:linear-gradient(135deg,#1d4ed8,#0284c7);color:#fff}
        .input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid #1a2d45;background:#111f35;color:#e2e8f0;font-size:14px;margin-bottom:10px}
        .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#0284c7);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px}
        .daybtn{width:34px;height:34px;border-radius:8px;border:1px solid #1a2d45;background:#060d18;color:#4a6080;font-weight:700;font-size:12px;flex-shrink:0}
        .daybtn.selected{border-color:#2563eb;background:#2563eb;color:#fff}
        #topbar{background:linear-gradient(135deg,#1e3a8a,#1d4ed8,#0284c7);padding:14px 16px;position:sticky;top:0;z-index:50}
        #bottomnav{position:fixed;bottom:0;left:0;right:0;background:#0d1b2e;border-top:1px solid #1a2d45;display:flex;z-index:50}
        .navbtn{flex:1;padding:10px 4px;background:transparent;color:#4a6080;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px}
        .navbtn.active{color:#2563eb}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const FIREBASE_URL = "https://vacation-course-default-rtdb.firebaseio.com";

        function App() {
            const [tab, setTab] = useState("attendance");
            const [selectedDay, setSelectedDay] = useState(1);
            const [students, setStudents] = useState([]);
            const [attendance, setAttendance] = useState({});
            const [fees, setFees] = useState({});
            const [settings, setSettings] = useState({ courseName: "Vacation Course 2025", teacher: "Khan Sir", feeTotal: 3000 });

            useEffect(() => {
                fetch(`${FIREBASE_URL}/vacationpro.json`).then(r => r.json()).then(data => {
                    if (data) {
                        if (data.students) setStudents(Object.values(data.students));
                        if (data.attendance) setAttendance(data.attendance);
                        if (data.fees) setFees(data.fees);
                        if (data.settings) setSettings(data.settings);
                    }
                });
            }, []);

            const toggleAtt = async (sid) => {
                const cur = (attendance[sid] || {})[selectedDay] || "";
                const next = cur === "P" ? "A" : cur === "A" ? "L" : "P";
                const newAtt = { ...attendance, [sid]: { ...(attendance[sid] || {}), [selectedDay]: next } };
                setAttendance(newAtt);
                await fetch(`${FIREBASE_URL}/vacationpro/attendance/${sid}.json`, { method: "PATCH", body: JSON.stringify({ [selectedDay]: next }) });
            };

            const waLink = (phone, msg) => {
                const num = phone.startsWith("92") ? phone : "92" + phone.replace(/^0/, "");
                return `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
            };

            return (
                <div>
                    <div id="topbar">
                        <div className="font-black text-white text-lg">🎓 {settings.courseName}</div>
                        <div className="text-[10px] text-blue-200">Teacher: {settings.teacher}</div>
                    </div>

                    <div className="p-4 max-w-2xl mx-auto">
                        {tab === "attendance" && (
                            <>
                                <div className="card overflow-x-auto flex gap-2 p-2">
                                    {[...Array(30)].map((_, i) => (
                                        <button key={i} onClick={() => setSelectedDay(i+1)} className={`daybtn ${selectedDay === i+1 ? 'selected' : ''}`}>{i+1}</button>
                                    ))}
                                </div>
                                {students.map(s => (
                                    <div key={s.id} className="card flex items-center gap-3">
                                        <div className="avatar">{s.name[0]}</div>
                                        <div className="flex-1">
                                            <div className="font-bold text-sm">{s.name}</div>
                                            <div className="text-[10px] text-slate-500">{s.batch}</div>
                                        </div>
                                        <button onClick={() => toggleAtt(s.id)} className="btn bg-slate-800 border border-slate-700 min-w-[80px]">
                                            {(attendance[s.id] || {})[selectedDay] || "Mark"}
                                        </button>
                                        <a href={waLink(s.phone, `Hi, ${s.name} was marked ${(attendance[s.id]||{})[selectedDay]} on Day ${selectedDay}`)} className="btn bg-green-600">📱</a>
                                    </div>
                                ))}
                            </>
                        )}

                        {tab === "students" && (
                            <div>
                                <button className="btn btn-blue w-full mb-4">➕ Add New Student</button>
                                {students.map(s => (
                                    <div key={s.id} className="card">
                                        <div className="font-bold">{s.name}</div>
                                        <div className="text-xs text-slate-500">Father: {s.father} | {s.phone}</div>
                                        <div className="flex gap-2 mt-3">
                                            <button className="btn bg-slate-800 flex-1">💰 Fee</button>
                                            <button className="btn bg-slate-800 flex-1">📊 Report</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div id="bottomnav">
                        <button onClick={() => setTab("attendance")} className={`navbtn ${tab==='attendance'?'active':''}`}>📋<span>Attendance</span></button>
                        <button onClick={() => setTab("students")} className={`navbtn ${tab==='students'?'active':''}`}>👥<span>Students</span></button>
                        <button onClick={() => setTab("reports")} className={`navbtn ${tab==='reports'?'active':''}`}>📊<span>Reports</span></button>
                        <button onClick={() => setTab("settings")} className={`navbtn ${tab==='settings'?'active':''}`}>⚙️<span>Settings</span></button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
