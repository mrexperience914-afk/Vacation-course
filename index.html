<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎓 VacationPro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#060d18;color:#e2e8f0;min-height:100vh;padding-bottom:80px}
        .card{background:#0d1b2e;border:1px solid #1a2d45;border-radius:14px;padding:16px;margin-bottom:12px}
        .btn{border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;transition: opacity 0.2s;}
        .btn:active{opacity: 0.7;}
        .input{width:100%;padding:12px;border-radius:10px;border:1px solid #1a2d45;background:#111f35;color:#fff;margin-bottom:10px}
        .daybtn{width:40px;height:40px;border-radius:8px;border:1px solid #1a2d45;background:#060d18;color:#4a6080;font-weight:700;flex-shrink:0}
        .daybtn.selected{border-color:#2563eb;background:#2563eb;color:#fff}
        #bottomnav{position:fixed;bottom:0;left:0;right:0;background:#0d1b2e;border-top:1px solid #1a2d45;display:flex;padding:5px 0;z-index:100}
        .navbtn{flex:1;background:transparent;color:#4a6080;font-size:10px;display:flex;flex-direction:column;align-items:center}
        .navbtn.active{color:#2563eb}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const FIREBASE_URL = "https://vacation-course-default-rtdb.firebaseio.com";

        function App() {
            const [tab, setTab] = useState("attendance");
            const [selectedDay, setSelectedDay] = useState(1);
            const [students, setStudents] = useState([]);
            const [attendance, setAttendance] = useState({});
            const [showAddModal, setShowAddModal] = useState(false);
            const [newStudent, setNewStudent] = useState({ name: '', father: '', phone: '', batch: 'Morning' });

            const loadData = () => {
                fetch(`${FIREBASE_URL}/vacationpro.json`).then(r => r.json()).then(data => {
                    if (data) {
                        if (data.students) setStudents(Object.values(data.students));
                        if (data.attendance) setAttendance(data.attendance);
                    }
                });
            };

            useEffect(() => { loadData(); }, []);

            const addStudent = async () => {
                const id = Date.now().toString();
                const studentData = { ...newStudent, id };
                await fetch(`${FIREBASE_URL}/vacationpro/students/${id}.json`, { method: "PUT", body: JSON.stringify(studentData) });
                setShowAddModal(false);
                loadData();
            };

            const toggleAtt = async (sid) => {
                const cur = (attendance[sid] || {})[selectedDay] || "";
                const next = cur === "P" ? "A" : cur === "A" ? "L" : "P";
                const newAtt = { ...attendance, [sid]: { ...(attendance[sid] || {}), [selectedDay]: next } };
                setAttendance(newAtt);
                await fetch(`${FIREBASE_URL}/vacationpro/attendance/${sid}.json`, { method: "PATCH", body: JSON.stringify({ [selectedDay]: next }) });
            };

            return (
                <div className="pb-20">
                    <header className="bg-gradient-to-r from-blue-900 to-blue-700 p-5 sticky top-0 shadow-xl z-50">
                        <h1 className="text-xl font-black text-white">🎓 Vacation Course 2025</h1>
                        <p className="text-xs text-blue-200">Teacher: Khan Sir</p>
                    </header>

                    <div className="p-4">
                        {tab === "attendance" && (
                            <>
                                <div className="card flex gap-2 overflow-x-auto py-3">
                                    {[...Array(30)].map((_, i) => (
                                        <button key={i} onClick={() => setSelectedDay(i+1)} className={`daybtn ${selectedDay === i+1 ? 'selected' : ''}`}>{i+1}</button>
                                    ))}
                                </div>
                                {students.map(s => (
                                    <div key={s.id} className="card flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold">{s.name[0]}</div>
                                            <div>
                                                <div className="font-bold text-sm">{s.name}</div>
                                                <div className="text-[10px] text-slate-500">{s.batch}</div>
                                            </div>
                                        </div>
                                        <button onClick={() => toggleAtt(s.id)} className={`btn min-w-[90px] ${attendance[s.id]?.[selectedDay] === 'P' ? 'bg-green-600' : attendance[s.id]?.[selectedDay] === 'A' ? 'bg-red-600' : 'bg-slate-800'}`}>
                                            {attendance[s.id]?.[selectedDay] || "Mark"}
                                        </button>
                                    </div>
                                ))}
                            </>
                        )}

                        {tab === "students" && (
                            <div>
                                <button onClick={() => setShowAddModal(true)} className="btn bg-blue-600 w-full mb-4 py-4 text-lg">＋ Add New Student</button>
                                {students.map(s => (
                                    <div key={s.id} className="card">
                                        <div className="font-bold">{s.name}</div>
                                        <div className="text-xs text-slate-400">Father: {s.father} | {s.phone}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {showAddModal && (
                        <div className="overlay">
                            <div className="bg-[#0d1b2e] p-6 rounded-2xl w-full max-w-sm border border-slate-700">
                                <h2 className="text-lg font-bold mb-4">New Student</h2>
                                <input className="input" placeholder="Name" onChange={e => setNewStudent({...newStudent, name: e.target.value})}/>
                                <input className="input" placeholder="Father Name" onChange={e => setNewStudent({...newStudent, father: e.target.value})}/>
                                <input className="input" placeholder="Phone" onChange={e => setNewStudent({...newStudent, phone: e.target.value})}/>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowAddModal(false)} className="btn bg-slate-700 flex-1">Cancel</button>
                                    <button onClick={addStudent} className="btn bg-blue-600 flex-1">Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav id="bottomnav">
                        {['attendance', 'students', 'reports', 'settings'].map(t => (
                            <button key={t} onClick={() => setTab(t)} className={`navbtn ${tab === t ? 'active' : ''}`}>
                                <span className="text-lg">{t === 'attendance' ? '📋' : t === 'students' ? '👥' : t === 'reports' ? '📊' : '⚙️'}</span>
                                <span className="capitalize">{t}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
