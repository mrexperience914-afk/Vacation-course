<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>🎓 VacationPro</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#060d18;color:#e2e8f0;min-height:100vh;padding-bottom:70px}
  input,select,textarea,button{font-family:inherit;outline:none}
  button{cursor:pointer}
  .card{background:#0d1b2e;border:1px solid #1a2d45;border-radius:14px;padding:16px;margin-bottom:12px}
  .card2{background:#111f35}
  .btn{border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer}
  .btn-blue{background:linear-gradient(135deg,#1d4ed8,#0284c7);color:#fff}
  .btn-green{background:#16a34a;color:#fff}
  .btn-red{background:#dc2626;color:#fff}
  .btn-gray{background:#111f35;border:1px solid #1a2d45;color:#e2e8f0}
  .btn-wa{background:#25d366;color:#fff;text-decoration:none;display:inline-block;text-align:center}
  .input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid #1a2d45;background:#111f35;color:#e2e8f0;font-size:14px;margin-bottom:10px}
  .flex{display:flex;align-items:center}
  .gap8{gap:8px}
  .gap10{gap:10px}
  .badge{border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600}
  #topbar{background:linear-gradient(135deg,#1e3a8a,#1d4ed8,#0284c7);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 20px rgba(0,0,0,.4)}
  #bottomnav{position:fixed;bottom:0;left:0;right:0;background:#0d1b2e;border-top:1px solid #1a2d45;display:flex;z-index:50}
  .navbtn{flex:1;padding:10px 4px;border:none;background:transparent;color:#4a6080;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent;transition:all .2s}
  .navbtn.active{color:#2563eb;border-top-color:#2563eb}
  .navbtn span.icon{font-size:18px}
  .syncdot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#0284c7);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;flex-shrink:0}
  .daybtn{width:34px;height:34px;border-radius:8px;border:2px solid #1a2d45;background:#060d18;color:#4a6080;font-weight:700;font-size:12px;position:relative}
  .daybtn.selected{border-color:#2563eb;background:#2563eb;color:#fff}
  .daybtn.marked{background:#111f35;color:#e2e8f0}
  .statbtn{min-width:88px;padding:8px 14px;border-radius:10px;border:1px solid #1a2d45;font-weight:700;font-size:13px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100}
  .modal{background:#0d1b2e;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;border:1px solid #1a2d45}
  #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:12px;font-weight:700;font-size:13px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4);display:none;white-space:nowrap}
  .calcell{width:32px;height:32px;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1px solid rgba(255,255,255,.05)}
  .progbar{height:7px;background:#111f35;border-radius:4px;overflow:hidden;margin:6px 0}
  .progfill{height:100%;border-radius:4px;transition:width .5s}
  #content{padding:14px;max-width:860px;margin:0 auto}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .pulsing{animation:pulse 1s infinite}
</style>
</head>
<body>

<div id="topbar">
  <div>
    <div style="font-size:18px;font-weight:900;color:#fff">🎓 VacationPro</div>
    <div id="coursename-label" style="font-size:10px;color:rgba(255,255,255,.65);margin-top:1px">Loading...</div>
  </div>
  <div class="flex gap8">
    <div class="flex gap8 badge" style="background:rgba(0,0,0,.3)">
      <span class="syncdot" id="syncdot" style="background:#4b5563"></span>
      <span id="synclabel" style="font-size:10px;color:rgba(255,255,255,.8);font-weight:600">OFFLINE</span>
    </div>
  </div>
</div>

<div id="content"></div>

<div id="bottomnav">
  <button class="navbtn active" id="nav-attendance" onclick="switchTab('attendance')"><span class="icon">📋</span><span>Attendance</span></button>
  <button class="navbtn" id="nav-students" onclick="switchTab('students')"><span class="icon">👥</span><span>Students</span></button>
  <button class="navbtn" id="nav-reports" onclick="switchTab('reports')"><span class="icon">📊</span><span>Reports</span></button>
  <button class="navbtn" id="nav-analysis" onclick="switchTab('analysis')"><span class="icon">📈</span><span>Analysis</span></button>
  <button class="navbtn" id="nav-settings" onclick="switchTab('settings')"><span class="icon">⚙️</span><span>Settings</span></button>
</div>

<div id="toast"></div>

<script>
// --- CORE CONFIG ---
const FIREBASE_URL = "https://vacation-course-default-rtdb.firebaseio.com";
const fb = {
  async get(path){ try{ const r=await fetch(`${FIREBASE_URL}/${path}.json`); return r.ok?await r.json():null; }catch{return null;} },
  async set(path,data){ try{ await fetch(`${FIREBASE_URL}/${path}.json`,{method:"PUT",body:JSON.stringify(data)}); }catch(e){} },
  async patch(path,data){ try{ await fetch(`${FIREBASE_URL}/${path}.json`,{method:"PATCH",body:JSON.stringify(data)}); }catch(e){} }
};

let state = {
  tab: "attendance",
  students: [],
  attendance: {},
  notes: {},
  fees: {},
  settings: { courseName:"Vacation Course 2025", teacher:"Khan Sir", feeTotal:3000 },
  selectedDay: 1,
  syncStatus: "idle",
  search: "",
  batchFilter: "All"
};

const DAYS = Array.from({length:30},(_,i)=>i+1);
const S_NEXT = {"":"P",P:"A",A:"L",L:"P"};
const S_LABEL = {P:"Present",A:"Absent",L:"Leave","":"Mark ↓"};
const S_BG = {P:"#16a34a",A:"#dc2626",L:"#d97706","":"#111f35"};

// --- SYNC ---
async function pullFirebase(){
    setSyncStatus("syncing");
    const data = await fb.get("vacationpro");
    if(data){
        if(data.students) state.students = Object.values(data.students);
        if(data.attendance) state.attendance = data.attendance;
        if(data.fees) state.fees = data.fees;
        if(data.settings) state.settings = data.settings;
        render();
    }
    setSyncStatus("live");
}

function setSyncStatus(s){
    const dot = document.getElementById("syncdot");
    const lbl = document.getElementById("synclabel");
    dot.style.background = s==="live"?"#22c55e":"#f59e0b";
    lbl.textContent = s==="live"?"LIVE":"SYNCING";
}

// --- TABS & RENDER ---
function switchTab(t){
    state.tab = t;
    document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"));
    document.getElementById("nav-"+t).classList.add("active");
    render();
}

function render(){
    const el = document.getElementById("content");
    document.getElementById("coursename-label").textContent = state.settings.courseName;
    
    if(state.tab === "attendance"){
        el.innerHTML = `<div class="card flex gap8" style="overflow-x:auto">${DAYS.map(d=>`<button class="daybtn ${d===state.selectedDay?'selected':''}" onclick="state.selectedDay=${d};render()">${d}</button>`).join('')}</div>` +
        state.students.map(s => `
            <div class="card flex gap10">
                <div class="avatar">${s.name[0]}</div>
                <div style="flex:1"><b>${s.name}</b><br><small>${s.batch}</small></div>
                <button class="statbtn" style="background:${S_BG[(state.attendance[s.id]||{})[state.selectedDay]||'']}" onclick="toggleAtt('${s.id}')">
                    ${S_LABEL[(state.attendance[s.id]||{})[state.selectedDay]||'']}
                </button>
            </div>
        `).join('');
    } else if(state.tab === "analysis") {
        el.innerHTML = `<div class="card"><h3>Analysis Feature Enabled</h3><p>Total Students: ${state.students.length}</p></div>`;
    } else {
        el.innerHTML = `<div class="card">Tab ${state.tab} is loading data...</div>`;
    }
}

async function toggleAtt(sid){
    if(!state.attendance[sid]) state.attendance[sid] = {};
    state.attendance[sid][state.selectedDay] = S_NEXT[state.attendance[sid][state.selectedDay]||""];
    render();
    await fb.set(`vacationpro/attendance/${sid}`, state.attendance[sid]);
}

setInterval(pullFirebase, 8000);
pullFirebase();
</script>
</body>
</html>
