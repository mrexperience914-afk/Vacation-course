<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎓 VacationPro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060d18; color: #e2e8f0; font-family: system-ui, sans-serif; }
        .day-btn { min-width: 40px; height: 40px; border-radius: 8px; border: 1px solid #1a2d45; }
        .active-day { background-color: #1d4ed8; color: white; border-color: #2563eb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE CONFIG ---
        const FIREBASE_URL = "https://vacation-course-default-rtdb.firebaseio.com";

        function App() {
            const [tab, setTab] = useState("attendance");
            const [selectedDay, setSelectedDay] = useState(1);
            const [students, setStudents] = useState([]);
            const [attendance, setAttendance] = useState({});

            // Auto-pull from Firebase
            useEffect(() => {
                fetch(`${FIREBASE_URL}/vacationpro.json`)
                    .then(res => res.json())
                    .then(data => {
                        if (data) {
                            if (data.students) setStudents(Object.values(data.students));
                            if (data.attendance) setAttendance(data.attendance);
                        }
                    });
            }, []);

            const toggleAttendance = async (sid) => {
                const currentStatus = (attendance[sid] || {})[selectedDay] || "";
                const nextStatus = currentStatus === "P" ? "A" : currentStatus === "A" ? "L" : "P";
                
                const newAtt = { ...attendance, [sid]: { ...(attendance[sid] || {}), [selectedDay]: nextStatus } };
                setAttendance(newAtt);

                // Sync to Firebase
                await fetch(`${FIREBASE_URL}/vacationpro/attendance/${sid}.json`, {
                    method: "PATCH",
                    body: JSON.stringify({ [selectedDay]: nextStatus })
                });
            };

            return (
                <div className="max-w-md mx-auto pb-20">
                    <header className="bg-blue-900 p-4 sticky top-0 z-10 shadow-lg">
                        <h1 className="text-xl font-black text-white">🎓 VacationPro</h1>
                        <p className="text-xs text-blue-300">Day {selectedDay} / 30</p>
                    </header>

                    <main className="p-4">
                        <div className="flex gap-2 overflow-x-auto mb-6 p-2 bg-slate-900 rounded-xl">
                            {[...Array(30)].map((_, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => setSelectedDay(i + 1)}
                                    className={`day-btn flex-shrink-0 ${selectedDay === i + 1 ? 'active-day' : 'bg-slate-800'}`}
                                >
                                    {i + 1}
                                </button>
                            ))}
                        </div>

                        {students.length === 0 ? (
                            <div className="text-center py-10 text-slate-500">Add students in Settings to begin!</div>
                        ) : (
                            students.map(s => (
                                <div key={s.id} className="bg-slate-900 border border-slate-800 p-4 rounded-xl mb-3 flex items-center justify-between">
                                    <div>
                                        <div className="font-bold text-white">{s.name}</div>
                                        <div className="text-xs text-slate-500">{s.father}</div>
                                    </div>
                                    <button 
                                        onClick={() => toggleAttendance(s.id)}
                                        className={`px-4 py-2 rounded-lg font-bold text-sm min-w-[100px] border border-slate-700
                                            ${(attendance[s.id] || {})[selectedDay] === "P" ? "bg-green-600 text-white" : 
                                              (attendance[s.id] || {})[selectedDay] === "A" ? "bg-red-600 text-white" : 
                                              (attendance[s.id] || {})[selectedDay] === "L" ? "bg-yellow-600 text-white" : "bg-slate-800 text-slate-400"}`}
                                    >
                                        {(attendance[s.id] || {})[selectedDay] || "Mark ↓"}
                                    </button>
                                </div>
                            ))
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-2">
                        <button onClick={() => setTab("attendance")} className={`p-2 text-xs ${tab === 'attendance' ? 'text-blue-500' : 'text-slate-500'}`}>📋 Attendance</button>
                        <button onClick={() => setTab("students")} className={`p-2 text-xs ${tab === 'students' ? 'text-blue-500' : 'text-slate-500'}`}>👥 Students</button>
                        <button onClick={() => setTab("settings")} className={`p-2 text-xs ${tab === 'settings' ? 'text-blue-500' : 'text-slate-500'}`}>⚙️ Settings</button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
